name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        # actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src

      - name: Run tests
        run: pytest -q

      - name: Validate ops config
        run: python -m btr_ng.cli validate-ops

      - name: Validate registry
        run: python -m btr_ng.cli validate-registry

      - name: Validate seed sources
        run: python -m btr_ng.cli validate-seed-sources --source-dir data_sources/public_seed_sources

      - name: Regenerate committed seed data
        run: >
          python -m btr_ng.cli generate-real-seed
          --source-dir data_sources/public_seed_sources
          --registry-dir registry
          --nocopo-fixture-out tests/fixtures/nocopo/sample.json

      - name: Check seed outputs are committed
        run: git diff --exit-code -- registry tests/fixtures/nocopo/sample.json

      - name: Lint public copy
        run: python -m btr_ng.cli lint-copy

      - name: Scan repository safety
        run: python -m btr_ng.cli scan-repo-safety
