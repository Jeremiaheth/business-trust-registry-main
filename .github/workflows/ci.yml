name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        # actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Set up Node.js
        # actions/setup-node@v6.3.0
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install public intake dependencies
        run: npm ci
        working-directory: public_intake

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src

      - name: Run tests
        run: pytest -q

      - name: Run frontend route tests
        run: npm test
        working-directory: frontend

      - name: Run public intake tests
        run: npm test
        working-directory: public_intake

      - name: Typecheck public intake worker
        run: npm run typecheck
        working-directory: public_intake

      - name: Validate ops config
        run: python -m btr_ng.cli validate-ops

      - name: Validate registry
        run: python -m btr_ng.cli validate-registry

      - name: Validate seed sources
        run: python -m btr_ng.cli validate-seed-sources --source-dir data_sources/public_seed_sources

      - name: Regenerate committed seed data
        run: >
          python -m btr_ng.cli generate-real-seed
          --source-dir data_sources/public_seed_sources
          --registry-dir registry
          --nocopo-fixture-out tests/fixtures/nocopo/sample.json

      - name: Check seed outputs are committed
        run: git diff --exit-code -- registry tests/fixtures/nocopo/sample.json

      - name: Compute trust scores
        run: >
          python -m btr_ng.cli score
          --registry registry
          --out build/scores
          --ops-dir ops
          --ingestion-status healthy

      - name: Ingest NOCOPO fixture
        run: >
          python -m btr_ng.cli ingest-nocopo
          --input tests/fixtures/nocopo/sample.json
          --registry registry
          --out derived/nocopo

      - name: Report ingestion quality
        run: >
          python -m btr_ng.cli report-ingestion-quality
          --input tests/fixtures/nocopo/sample.json
          --derived derived/nocopo
          --out derived/reports
          --ingestion-status healthy
          --max-age-days 30

      - name: Build public API
        run: >
          python -m btr_ng.cli build-api
          --registry registry
          --scores build/scores
          --derived derived
          --out public/api/v1
          --ops-dir ops
          --ingestion-status healthy

      - name: Verify release manifest
        run: >
          python -m btr_ng.cli verify-manifest
          --manifest public/api/v1/manifests/latest.json

      - name: Build frontend
        env:
          VITE_PUBLIC_INTAKE_BASE_URL: https://${{ vars.CLOUDFLARE_PUBLIC_INTAKE_HOST || 'forms.btr.dpdns.org' }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.CLOUDFLARE_TURNSTILE_SITE_KEY || '' }}
        run: npm run build
        working-directory: frontend

      - name: Package Cloudflare Pages artifact
        run: >
          python -m btr_ng.cli package-cloudflare-pages
          --site-dir site/dist
          --api-dir public/api/v1
          --out build/cloudflare/pages

      - name: Lint public copy
        run: python -m btr_ng.cli lint-copy

      - name: Scan repository safety
        run: python -m btr_ng.cli scan-repo-safety
