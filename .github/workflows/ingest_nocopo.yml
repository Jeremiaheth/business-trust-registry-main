name: Ingest NOCOPO

on:
  workflow_dispatch:
    inputs:
      input_path:
        description: Local fixture path to ingest.
        required: false
        default: tests/fixtures/nocopo/sample.json
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        # actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate seed sources
        run: >
          python -m btr_ng.cli validate-seed-sources
          --source-dir data_sources/public_seed_sources

      - name: Regenerate committed seed data
        run: >
          python -m btr_ng.cli generate-real-seed
          --source-dir data_sources/public_seed_sources
          --registry-dir registry
          --nocopo-fixture-out tests/fixtures/nocopo/sample.json

      - name: Ingest NOCOPO fixture
        run: >
          python -m btr_ng.cli ingest-nocopo
          --input "${{ inputs.input_path }}"
          --registry registry
          --out derived/nocopo

      - name: Report ingestion quality
        run: >
          python -m btr_ng.cli report-ingestion-quality
          --input "${{ inputs.input_path }}"
          --derived derived/nocopo
          --out derived/reports
          --ingestion-status healthy
          --max-age-days 30

      - name: Upload derived procurement artifacts
        # actions/upload-artifact@v7.0.0
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: nocopo-derived
          path: |
            derived/nocopo
            derived/reports
