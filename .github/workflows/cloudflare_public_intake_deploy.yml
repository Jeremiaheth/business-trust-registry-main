name: Cloudflare Public Intake Deploy

on:
  push:
    branches:
      - main
    paths:
      - "public_intake/**"
      - ".github/workflows/cloudflare_public_intake_deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || '92353cdf85a371b9985b7a46cf677ccd' }}
  CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID || '16200b24cac290f487c7214793939a12' }}
  CLOUDFLARE_PUBLIC_HOST: ${{ vars.CLOUDFLARE_PUBLIC_HOST || 'www.btr.dpdns.org' }}
  CLOUDFLARE_PUBLIC_INTAKE_WORKER_NAME: ${{ vars.CLOUDFLARE_PUBLIC_INTAKE_WORKER_NAME || 'btr-ng-public-intake' }}
  CLOUDFLARE_PUBLIC_INTAKE_HOST: ${{ vars.CLOUDFLARE_PUBLIC_INTAKE_HOST || 'forms.btr.dpdns.org' }}
  CLOUDFLARE_PUBLIC_INTAKE_D1_NAME: ${{ vars.CLOUDFLARE_PUBLIC_INTAKE_D1_NAME || 'btr-ng-public-intake' }}
  WRANGLER_VERSION: "4.81.1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        # actions/setup-node@v6.3.0
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"

      - name: Check Cloudflare public intake prerequisites
        id: deploy_gate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TURNSTILE_SECRET_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY }}
          CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ vars.CLOUDFLARE_TURNSTILE_SITE_KEY || '' }}
          CLOUDFLARE_PUBLIC_INTAKE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_PUBLIC_INTAKE_D1_DATABASE_ID || '' }}
          CLOUDFLARE_PUBLIC_INTAKE_D1_PREVIEW_DATABASE_ID: ${{ vars.CLOUDFLARE_PUBLIC_INTAKE_D1_PREVIEW_DATABASE_ID || '' }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_TURNSTILE_SECRET_KEY" ] || [ -z "$CLOUDFLARE_TURNSTILE_SITE_KEY" ] || [ -z "$CLOUDFLARE_PUBLIC_INTAKE_D1_DATABASE_ID" ] || [ -z "$CLOUDFLARE_PUBLIC_INTAKE_D1_PREVIEW_DATABASE_ID" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Public intake deploy skipped because Cloudflare secret/vars are incomplete." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Install public intake dependencies
        run: npm ci
        working-directory: public_intake

      - name: Run public intake tests
        run: npm test
        working-directory: public_intake

      - name: Typecheck public intake worker
        run: npm run typecheck
        working-directory: public_intake

      - name: Deploy public intake worker
        if: ${{ steps.deploy_gate.outputs.enabled == 'true' }}
        env:
          CF_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_COMPATIBILITY_DATE: "2025-11-01"
          CF_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_PUBLIC_INTAKE_D1_DATABASE_ID }}
          CF_D1_PREVIEW_DATABASE_ID: ${{ vars.CLOUDFLARE_PUBLIC_INTAKE_D1_PREVIEW_DATABASE_ID }}
          CF_HOSTNAME: ${{ env.CLOUDFLARE_PUBLIC_INTAKE_HOST }}
          CF_PUBLIC_SITE_ORIGIN: https://${{ env.CLOUDFLARE_PUBLIC_HOST }}
          CF_REPO_ROOT: ${{ github.workspace }}
          CF_TURNSTILE_SECRET_KEY: ${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY }}
          CF_TURNSTILE_SITE_KEY: ${{ vars.CLOUDFLARE_TURNSTILE_SITE_KEY }}
          CF_WORKER_NAME: ${{ env.CLOUDFLARE_PUBLIC_INTAKE_WORKER_NAME }}
          CF_ZONE_ID: ${{ env.CLOUDFLARE_ZONE_ID }}
        run: node scripts/cloudflare_public_intake_deploy.mjs

      - name: Write deployment summary
        if: ${{ steps.deploy_gate.outputs.enabled == 'true' }}
        run: |
          echo "Public intake worker: ${CLOUDFLARE_PUBLIC_INTAKE_WORKER_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "Public intake host: https://${CLOUDFLARE_PUBLIC_INTAKE_HOST}/" >> "$GITHUB_STEP_SUMMARY"
